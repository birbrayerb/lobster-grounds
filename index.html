<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Lobster Wars</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1628; font-family: 'Georgia', serif; }
canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: default; }
#ui-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#ui-overlay > * { pointer-events: auto; }
#hud {
  position: absolute; top: 12px; left: 12px; right: 12px;
  display: flex; justify-content: space-between; align-items: flex-start;
  font-size: 14px; color: #e8d5a3; z-index: 20;
}
.hud-panel {
  background: rgba(10, 22, 40, 0.85); border: 1px solid rgba(232,213,163,0.3);
  border-radius: 8px; padding: 8px 14px; backdrop-filter: blur(4px);
  text-shadow: 0 1px 3px rgba(0,0,0,0.8); flex-shrink: 0;
}
.hud-panel .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
.hud-panel .value { font-size: 18px; font-weight: bold; }
.hud-panel .value#hud-cash { font-size: 22px; color: #5aff5a; display: block !important; visibility: visible !important; }
#shop-panel, #catch-panel, #upgrade-panel {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(10, 22, 40, 0.95); border: 2px solid rgba(232,213,163,0.4);
  border-radius: 12px; padding: 24px 32px; min-width: 320px; max-width: 420px;
  color: #e8d5a3; display: none; backdrop-filter: blur(8px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.panel-title { font-size: 22px; text-align: center; margin-bottom: 16px; border-bottom: 1px solid rgba(232,213,163,0.2); padding-bottom: 8px; }
.shop-item, .upgrade-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(232,213,163,0.1);
}
.shop-btn, .upgrade-btn {
  background: rgba(232,213,163,0.15); border: 1px solid rgba(232,213,163,0.4);
  color: #e8d5a3; padding: 6px 14px; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 13px; transition: all 0.2s;
}
.shop-btn:hover, .upgrade-btn:hover { background: rgba(232,213,163,0.3); }
.shop-btn:disabled, .upgrade-btn:disabled { opacity: 0.3; cursor: default; }
.close-btn {
  position: absolute; top: 8px; right: 12px; background: none; border: none;
  color: #e8d5a3; font-size: 24px; cursor: pointer; opacity: 0.6;
}
.close-btn:hover { opacity: 1; }
#controls-hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(232,213,163,0.5); text-align: center;
}
#time-btn { display: none; }
#notification {
  position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(10,22,40,0.95); border: 1px solid rgba(232,213,163,0.4);
  border-radius: 8px; padding: 10px 20px; color: #e8d5a3; font-size: 14px;
  display: none; white-space: nowrap; transition: opacity 0.3s; z-index: 25;
  max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
}
#start-screen {
  position: fixed; top:0; left:0; width:100%; height:100%; z-index: 100;
  background: linear-gradient(180deg, #0a1628 0%, #132744 40%, #1a3a5c 70%, #0d2137 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #e8d5a3;
}
#start-screen h1 { font-size: 48px; margin-bottom: 8px; text-shadow: 0 2px 12px rgba(0,0,0,0.5); letter-spacing: 3px; text-align: center; width: 100%; }
#start-screen .subtitle { font-size: 16px; opacity: 0.6; margin-bottom: 40px; letter-spacing: 2px; }
#start-btn {
  background: rgba(232,213,163,0.15); border: 2px solid rgba(232,213,163,0.5);
  color: #e8d5a3; padding: 14px 40px; border-radius: 10px; cursor: pointer;
  font-family: inherit; font-size: 18px; letter-spacing: 2px; transition: all 0.3s;
}
#start-btn:hover { background: rgba(232,213,163,0.3); transform: scale(1.05); }
#continue-btn {
  margin-top: 12px; background: none; border: 1px solid rgba(232,213,163,0.3);
  color: #e8d5a3; padding: 10px 30px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 14px; display: none; transition: all 0.3s;
}
#continue-btn:hover { background: rgba(232,213,163,0.15); }
.catch-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid rgba(232,213,163,0.1);
}
.catch-action {
  background: rgba(232,213,163,0.15); border: 1px solid rgba(232,213,163,0.4);
  color: #e8d5a3; padding: 4px 10px; border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 12px; margin-left: 6px;
}
.catch-action:hover { background: rgba(232,213,163,0.3); }
.catch-action.keep { border-color: #5a5; }
.catch-action.toss { border-color: #a55; }
#connection-status {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; padding: 4px 12px; border-radius: 12px; z-index: 25;
  background: rgba(10,22,40,0.85); border: 1px solid rgba(232,213,163,0.3);
  color: #e8d5a3; display: none;
}
#connection-status.connected { border-color: #27ae60; color: #5aff5a; }
#connection-status.disconnected { border-color: #e74c3c; color: #ff5a5a; display: block; }
#player-count {
  position: absolute; top: 12px; right: 180px;
  font-size: 12px; padding: 4px 10px; border-radius: 8px;
  background: rgba(10,22,40,0.85); border: 1px solid rgba(232,213,163,0.3);
  color: #e8d5a3; z-index: 25;
}
#chat-container {
  position: absolute; bottom: 50px; left: 12px; width: 300px; z-index: 25;
}
#chat-log {
  max-height: 120px; overflow: hidden; margin-bottom: 4px;
}
.chat-msg {
  font-size: 12px; color: #e8d5a3; padding: 2px 0;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8); opacity: 0.9;
}
.chat-msg .chat-name { font-weight: bold; }
#chat-input {
  width: 100%; padding: 6px 10px; border-radius: 6px;
  background: rgba(10,22,40,0.85); border: 1px solid rgba(232,213,163,0.3);
  color: #e8d5a3; font-family: inherit; font-size: 13px;
  outline: none; display: none;
}
#chat-input:focus { border-color: rgba(232,213,163,0.6); }

/* Auth Screen */
#auth-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200;
  background: linear-gradient(180deg, #0a1628 0%, #132744 40%, #1a3a5c 70%, #0d2137 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #e8d5a3;
}
#auth-screen .auth-box {
  background: rgba(10, 22, 40, 0.9); border: 2px solid rgba(232,213,163,0.3);
  border-radius: 16px; padding: 32px 40px; width: 380px; max-width: 90vw;
  backdrop-filter: blur(12px); box-shadow: 0 12px 48px rgba(0,0,0,0.5);
}
#auth-screen h1 { font-size: 36px; text-align: center; margin-bottom: 4px; letter-spacing: 3px; }
#auth-screen .auth-subtitle { text-align: center; font-size: 14px; opacity: 0.5; margin-bottom: 24px; letter-spacing: 2px; }
#auth-screen .auth-emoji { font-size: 48px; text-align: center; display: block; margin-bottom: 8px; }
.auth-input {
  width: 100%; padding: 12px 16px; margin-bottom: 12px; border-radius: 8px;
  background: rgba(232,213,163,0.08); border: 1px solid rgba(232,213,163,0.25);
  color: #e8d5a3; font-family: inherit; font-size: 15px; outline: none;
  transition: border-color 0.2s;
}
.auth-input:focus { border-color: rgba(232,213,163,0.6); }
.auth-input::placeholder { color: rgba(232,213,163,0.35); }
.auth-btn {
  width: 100%; padding: 12px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 16px; letter-spacing: 1px; transition: all 0.2s;
  border: 2px solid rgba(232,213,163,0.5); background: rgba(232,213,163,0.15); color: #e8d5a3;
  margin-bottom: 8px;
}
.auth-btn:hover { background: rgba(232,213,163,0.3); transform: scale(1.02); }
.auth-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
.auth-btn.primary { background: rgba(90,255,90,0.15); border-color: rgba(90,255,90,0.4); }
.auth-btn.primary:hover { background: rgba(90,255,90,0.25); }
.auth-divider {
  text-align: center; margin: 16px 0; font-size: 12px; opacity: 0.4;
  position: relative;
}
.auth-divider::before, .auth-divider::after {
  content: ''; position: absolute; top: 50%; width: 35%;
  height: 1px; background: rgba(232,213,163,0.2);
}
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }
.auth-social-btn {
  width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 6px;
  font-family: inherit; font-size: 13px; cursor: default;
  border: 1px solid rgba(232,213,163,0.15); background: rgba(232,213,163,0.05);
  color: rgba(232,213,163,0.35); text-align: center;
}
.auth-toggle { text-align: center; margin-top: 16px; font-size: 13px; }
.auth-toggle a { color: #5aff5a; cursor: pointer; text-decoration: underline; }
.auth-error { color: #ff5a5a; font-size: 13px; text-align: center; margin-bottom: 8px; min-height: 18px; }
.auth-skip { text-align: center; margin-top: 12px; }
.auth-skip a { color: rgba(232,213,163,0.4); cursor: pointer; font-size: 12px; text-decoration: underline; }

/* Logout button */
#logout-btn {
  position: absolute; top: 12px; right: 12px;
  background: rgba(10,22,40,0.85); border: 1px solid rgba(232,213,163,0.3);
  color: #e8d5a3; padding: 6px 12px; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 11px; z-index: 25; display: none;
}
#logout-btn:hover { background: rgba(232,213,163,0.2); }
</style>
</head>
<body>
<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-box">
    <span class="auth-emoji">🦞⚔️</span>
    <h1>LOBSTER WARS</h1>
    <div class="auth-subtitle">Battle for the Grounds</div>
    <div class="auth-error" id="auth-error"></div>
    <div id="auth-form-login">
      <input class="auth-input" type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input class="auth-input" type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
      <button class="auth-btn primary" id="auth-login-btn" onclick="authLogin()">LOG IN</button>
      <div class="auth-toggle">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
    </div>
    <div id="auth-form-signup" style="display:none">
      <input class="auth-input" type="text" id="auth-signup-name" placeholder="Display Name" maxlength="20">
      <input class="auth-input" type="email" id="auth-signup-email" placeholder="Email" autocomplete="email">
      <input class="auth-input" type="password" id="auth-signup-password" placeholder="Password (min 6 chars)" autocomplete="new-password">
      <button class="auth-btn primary" id="auth-signup-btn" onclick="authSignup()">SIGN UP</button>
      <div class="auth-toggle">Already have an account? <a onclick="showLogin()">Log in</a></div>
    </div>
    <div class="auth-divider">or continue with</div>
    <button class="auth-social-btn">🔵 Google — Coming Soon</button>
    <button class="auth-social-btn">🍎 Apple — Coming Soon</button>
    <button class="auth-social-btn">💬 Discord — Coming Soon</button>
    <div class="auth-skip"><a onclick="skipAuth()">Play as Guest</a></div>
  </div>
</div>

<div id="start-screen" style="display:none">
  <div style="font-size:64px;line-height:1;margin-bottom:8px">🦞</div>
  <h1>LOBSTER WARS</h1>
  <div class="subtitle">Battle for the Grounds</div>
  <button id="start-btn">NEW GAME</button>
  <button id="continue-btn">CONTINUE</button>
</div>

<canvas id="game"></canvas>

<div id="ui-overlay">
  <div id="hud">
    <div class="hud-panel">
      <div class="label">Cash</div>
      <div class="value" id="hud-cash">$500</div>
    </div>
    <div class="hud-panel" style="text-align:center">
      <div class="label" id="hud-time-label">Day 1</div>
      <div class="value" id="hud-time">6:00 AM</div>
      <div class="label" id="hud-weather">Clear</div>
    </div>
    <div class="hud-panel" style="text-align:right">
      <div class="label">Hold</div>
      <div class="value" id="hud-hold">0 / 20</div>
      <div class="label" id="hud-traps-info">Traps: 0 set</div>
    </div>
  </div>

  <div id="notification"></div>

  <div id="shop-panel">
    <button class="close-btn" onclick="closeShop()">&times;</button>
    <div class="panel-title">🏪 Dock Shop</div>
    <div id="shop-items"></div>
    <div style="margin-top:16px; text-align:center">
      <button class="shop-btn" onclick="openUpgrades()" style="width:100%">⬆ Upgrades</button>
    </div>
    <div style="margin-top:8px; text-align:center">
      <button class="shop-btn" id="sell-btn" onclick="sellCatch()" style="width:100%">💰 Sell Catch</button>
    </div>
  </div>

  <div id="upgrade-panel">
    <button class="close-btn" onclick="closeUpgrades()">&times;</button>
    <div class="panel-title">⬆ Upgrades</div>
    <div id="upgrade-items"></div>
  </div>

  <div id="catch-panel">
    <button class="close-btn" onclick="closeCatch()">&times;</button>
    <div class="panel-title">🦞 Trap Contents</div>
    <div id="catch-items"></div>
    <div style="margin-top:12px; text-align:center">
      <button class="shop-btn" onclick="closeCatch()">Done</button>
    </div>
  </div>

  <button id="time-btn" onclick="toggleTimeSpeed()">⏩ Speed Up</button>
  <div id="controls-hint"></div>
  <div id="connection-status">Connecting...</div>
  <div id="player-count">👥 0</div>
  <button id="logout-btn" onclick="authLogout()">🚪 Logout</button>
  <div id="chat-container">
    <div id="chat-log"></div>
    <input id="chat-input" type="text" placeholder="Press Enter to chat..." maxlength="200">
  </div>
</div>

<script>
// ============= SUPABASE AUTH =============
const SUPABASE_URL = 'https://banjuonrhsfrfbudwelf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhbmp1b25yaHNmcmZidWR3ZWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTM2ODUsImV4cCI6MjA4NzI2OTY4NX0.6jURyNUvB_r7_5dMA6fGhU2Ksyypz8FKe2BsIFnY3n4';
const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let authUser = null;
let authSession = null;
let isGuest = false;

function showLogin() {
  document.getElementById('auth-form-login').style.display = 'block';
  document.getElementById('auth-form-signup').style.display = 'none';
  document.getElementById('auth-error').textContent = '';
}
function showSignup() {
  document.getElementById('auth-form-login').style.display = 'none';
  document.getElementById('auth-form-signup').style.display = 'block';
  document.getElementById('auth-error').textContent = '';
}

async function authLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) { document.getElementById('auth-error').textContent = 'Enter email and password'; return; }
  
  document.getElementById('auth-login-btn').disabled = true;
  document.getElementById('auth-error').textContent = '';
  
  const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
  document.getElementById('auth-login-btn').disabled = false;
  
  if (error) { document.getElementById('auth-error').textContent = error.message; return; }
  
  authUser = data.user;
  authSession = data.session;
  onAuthSuccess();
}

async function authSignup() {
  const name = document.getElementById('auth-signup-name').value.trim() || 'New Lobsterman';
  const email = document.getElementById('auth-signup-email').value.trim();
  const password = document.getElementById('auth-signup-password').value;
  if (!email || !password) { document.getElementById('auth-error').textContent = 'Enter email and password'; return; }
  if (password.length < 6) { document.getElementById('auth-error').textContent = 'Password must be at least 6 characters'; return; }
  
  document.getElementById('auth-signup-btn').disabled = true;
  document.getElementById('auth-error').textContent = '';
  
  const { data, error } = await sbClient.auth.signUp({
    email, password,
    options: { 
      data: { display_name: name },
      emailRedirectTo: 'https://lobster-grounds.vercel.app'
    }
  });
  document.getElementById('auth-signup-btn').disabled = false;
  
  if (error) { document.getElementById('auth-error').textContent = error.message; return; }
  
  if (data.user && !data.session) {
    document.getElementById('auth-error').textContent = 'Check your email to confirm your account!';
    document.getElementById('auth-error').style.color = '#5aff5a';
    return;
  }
  
  authUser = data.user;
  authSession = data.session;
  onAuthSuccess();
}

function skipAuth() {
  isGuest = true;
  onAuthSuccess();
}

async function authLogout() {
  await sbClient.auth.signOut();
  authUser = null;
  authSession = null;
  isGuest = false;
  document.getElementById('logout-btn').style.display = 'none';
  location.reload();
}

function onAuthSuccess() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  if (!isGuest) {
    document.getElementById('logout-btn').style.display = 'block';
  }
  // Check for save
  if (localStorage.getItem('lobster-wars-save') || localStorage.getItem('lobster-grounds-save')) {
    document.getElementById('continue-btn').style.display = 'block';
  }
}

// Auto-login check on load
(async function checkExistingSession() {
  const { data: { session } } = await sbClient.auth.getSession();
  if (session) {
    authUser = session.user;
    authSession = session;
    onAuthSuccess();
  }
})();

// Handle enter key in auth forms
document.addEventListener('keydown', function authKeyHandler(e) {
  if (document.getElementById('auth-screen').style.display === 'none') return;
  if (e.key === 'Enter') {
    if (document.getElementById('auth-form-signup').style.display !== 'none') authSignup();
    else authLogin();
  }
});

// ============= GAME STATE =============
const C = document.getElementById('game');
const ctx = C.getContext('2d');
let W, H, dpr;

const TILE = 40;
const MAP_W = 120, MAP_H = 120;
const DOCK_X = 5, DOCK_Y = 55, DOCK_W = 8, DOCK_H = 10;

let state = {
  mode: 'topdown', // topdown | underwater
  cash: 500,
  day: 1,
  timeOfDay: 6, // hours (0-24)
  timeSpeed: 1, // 1 = normal, 5 = fast
  weather: 'clear', // clear, cloudy, foggy, rainy
  weatherTimer: 0,
  boat: { x: (DOCK_X + DOCK_W/2) * TILE, y: (DOCK_Y + DOCK_H/2) * TILE, angle: 0, speed: 0 },
  camera: { x: 0, y: 0 },
  traps: [], // { x, y, bait, timeSet, contents: [], buoyColor }
  hold: [], // caught lobsters { size, type }
  holdCapacity: 20,
  bait: 10,
  trapSupply: 5,
  maxTraps: 10,
  boatLevel: 1,
  trapLevel: 1,
  baitLevel: 1,
  holdLevel: 1,
  trapsSet: 0,
  // underwater
  uwTrap: null, // which trap we're viewing
  uwCatch: [], // contents to sort
  uwAnimY: 0,
  uwHauling: false,
  // input
  keys: {},
  touch: null,
  shopOpen: false,
  upgradeOpen: false,
  catchOpen: false,
};

// ============= MULTIPLAYER =============
let mp = {
  ws: null,
  myId: null,
  myName: '',
  myColor: '#c0392b',
  connected: false,
  players: [], // other players from server
  traps: [], // all traps from server (other players')
  chatMessages: [], // from server
  territories: [], // territory zones from server
  lastPositionSend: 0,
  otherPlayerPositions: new Map(), // id -> {current, target} for lerping
};

function getWsUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('WS_URL') || 'wss://lobster-grounds-server.onrender.com'; // Lobster Wars server
}

function connectMultiplayer() {
  const url = getWsUrl();
  const statusEl = document.getElementById('connection-status');
  statusEl.textContent = 'Connecting...';
  statusEl.className = 'disconnected';
  statusEl.style.display = 'block';
  
  try {
    mp.ws = new WebSocket(url);
  } catch(e) {
    statusEl.textContent = '❌ Connection failed';
    return;
  }
  
  mp.ws.onopen = () => {
    mp.connected = true;
    statusEl.textContent = '✓ Connected';
    statusEl.className = 'connected';
    setTimeout(() => { if (mp.connected) statusEl.style.display = 'none'; }, 2000);
    // Send auth token if logged in
    if (authSession && authSession.access_token) {
      mp.ws.send(JSON.stringify({ type: 'auth', token: authSession.access_token }));
    }
    // Send stored identity so server can restore our name
    const storedName = localStorage.getItem('lobster-player-name');
    const storedColor = localStorage.getItem('lobster-player-color');
    if (storedName) {
      mp.ws.send(JSON.stringify({ type: 'identify', name: storedName, color: storedColor }));
    }
  };
  
  mp.ws.onclose = () => {
    mp.connected = false;
    statusEl.textContent = '❌ Disconnected — reconnecting...';
    statusEl.className = 'disconnected';
    statusEl.style.display = 'block';
    setTimeout(connectMultiplayer, 3000);
  };
  
  mp.ws.onerror = () => {};
  
  mp.ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleServerMessage(msg);
    } catch(e) {}
  };
}

function handleServerMessage(msg) {
  if (msg.type === 'welcome') {
    mp.myId = msg.id;
    mp.myName = msg.name;
    mp.myColor = msg.color;
    localStorage.setItem('lobster-player-name', msg.name);
    localStorage.setItem('lobster-player-color', msg.color);
    localStorage.setItem('lobster-player-id', msg.id);
    if (msg.gameTime) {
      state.day = msg.gameTime.day;
      state.timeOfDay = msg.gameTime.timeOfDay;
      state.weather = msg.gameTime.weather;
    }
    // Store territories
    if (msg.territories) {
      mp.territories = msg.territories;
    }
  } else if (msg.type === 'authSuccess') {
    // Apply saved player data from server
    const pd = msg.playerData;
    if (pd) {
      if (pd.cash !== undefined) state.cash = pd.cash;
      if (pd.display_name) mp.myName = pd.display_name;
      if (pd.upgrades) {
        if (pd.upgrades.boatLevel) state.boatLevel = pd.upgrades.boatLevel;
        if (pd.upgrades.trapLevel) state.trapLevel = pd.upgrades.trapLevel;
        if (pd.upgrades.baitLevel) state.baitLevel = pd.upgrades.baitLevel;
        if (pd.upgrades.holdLevel) state.holdLevel = pd.upgrades.holdLevel;
        if (pd.upgrades.maxTraps) state.maxTraps = pd.upgrades.maxTraps;
      }
      if (pd.inventory) {
        if (pd.inventory.bait !== undefined) state.bait = pd.inventory.bait;
        if (pd.inventory.trapSupply !== undefined) state.trapSupply = pd.inventory.trapSupply;
      }
      updateHUD();
    }
  } else if (msg.type === 'authError') {
    console.log('Auth error:', msg.message);
  } else if (msg.type === 'state') {
    // Other players (exclude self)
    mp.players = msg.players.filter(p => p.id !== mp.myId);
    
    // Lerp targets
    for (const p of mp.players) {
      if (!mp.otherPlayerPositions.has(p.id)) {
        mp.otherPlayerPositions.set(p.id, { x: p.x, y: p.y, angle: p.angle });
      }
      const lerp = mp.otherPlayerPositions.get(p.id);
      lerp.tx = p.x; lerp.ty = p.y; lerp.tAngle = p.angle;
    }
    // Clean up old lerp entries
    const activeIds = new Set(mp.players.map(p => p.id));
    for (const [id] of mp.otherPlayerPositions) {
      if (!activeIds.has(id)) mp.otherPlayerPositions.delete(id);
    }
    
    // Other players' traps (exclude own - we track those locally)
    mp.traps = msg.traps.filter(t => t.ownerId !== mp.myId);
    
    // Chat
    mp.chatMessages = msg.chat || [];
    updateChatLog();
    
    // Sync game time from server
    if (msg.gameTime) {
      state.day = msg.gameTime.day;
      state.timeOfDay = msg.gameTime.timeOfDay;
      state.weather = msg.gameTime.weather;
    }
    
    // Player count
    document.getElementById('player-count').textContent = `👥 ${msg.players.length}`;
  }
}

// Map data - procedurally generated
let mapData = []; // 0=deep, 1=medium, 2=shallow, 3=rocky, 4=dock
let mapGenerated = false;

function generateMap() {
  // Seed-based simple noise
  mapData = [];
  for (let y = 0; y < MAP_H; y++) {
    mapData[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      // Dock area
      if (x >= DOCK_X && x < DOCK_X + DOCK_W && y >= DOCK_Y && y < DOCK_Y + DOCK_H) {
        mapData[y][x] = 4;
        continue;
      }
      // Simple noise for depth
      let nx = x / MAP_W, ny = y / MAP_H;
      let d = Math.sin(nx * 12.5 + 1.3) * Math.cos(ny * 9.7 + 2.1) * 0.5
            + Math.sin(nx * 25 + ny * 18) * 0.25
            + Math.cos(nx * 7 - ny * 13 + 0.7) * 0.25;
      // Distance from shore (left edge)
      let shore = x / MAP_W;
      d = d * 0.5 + shore * 0.5;

      if (d < 0.2) mapData[y][x] = 2; // shallow
      else if (d < 0.45) mapData[y][x] = 1; // medium
      else mapData[y][x] = 0; // deep

      // Rocky patches
      let r = Math.sin(x * 3.7 + y * 2.3) * Math.cos(x * 1.9 - y * 4.1);
      if (r > 0.6 && d > 0.25) mapData[y][x] = 3;
    }
  }
  mapGenerated = true;
}

  W = window.innerWidth;
  H = window.innerHeight;
  C.width = W * dpr;
  C.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

  deepWater: '#0d2137',
  medWater: '#143652',
  shallowWater: '#1a5276',
  rocky: '#2c3e50',
  dock: '#8B6914',
  dockLight: '#a67c00',
  boat: '#c0392b',
  boatDeck: '#e74c3c',
  buoyEmpty: '#e74c3c',
  buoyPartial: '#f39c12',
  buoyFull: '#27ae60',
  sand: '#c2a366',
  kelp: '#1a6b3c',
  kelpLight: '#22884d',
  lobster: '#c0392b',

};

// ============= WATER ANIMATION =============
let waveTime = 0;
let particles = []; // bubbles, splashes

function addParticle(x, y, type) {
  particles.push({ x, y, type, life: 1, vx: (Math.random()-0.5)*2, vy: -Math.random()*2, size: Math.random()*3+1 });
}

// ============= TOP-DOWN RENDERING =============
function drawTopDown(dt) {
  waveTime += dt;

  // Camera follows boat
  let targetCX = state.boat.x - W/2;
  let targetCY = state.boat.y - H/2;
  state.camera.x += (targetCX - state.camera.x) * 0.08;
  state.camera.y += (targetCY - state.camera.y) * 0.08;

  let cx = state.camera.x + screenShake.x, cy = state.camera.y + screenShake.y;

  // Visible tile range
  let sx = Math.floor(cx / TILE) - 1;
  let sy = Math.floor(cy / TILE) - 1;
  let ex = Math.ceil((cx + W) / TILE) + 1;
  let ey = Math.ceil((cy + H) / TILE) + 1;

  // Time-of-day overlay
  let daylight = getDaylight();

  // Draw tiles
  for (let y = Math.max(0, sy); y < Math.min(MAP_H, ey); y++) {
    for (let x = Math.max(0, sx); x < Math.min(MAP_W, ex); x++) {
      let px = x * TILE - cx, py = y * TILE - cy;
      let tile = mapData[y][x];

      // Wave shimmer
      let shimmer = Math.sin(waveTime * 2 + x * 0.8 + y * 0.6) * 8;

      if (tile === 4) {
        ctx.fillStyle = COLORS.dock;
        ctx.fillRect(px, py, TILE, TILE);
        if ((x + y) % 2 === 0) {
          ctx.fillStyle = COLORS.dockLight;
          ctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
        }
      } else {
        // Depth blending - sample neighbors for smooth transitions
        let depthVal = tile === 0 ? 0 : tile === 1 ? 0.4 : tile === 2 ? 0.75 : 0.2;
        // Blend with neighbors
        let blendDepth = depthVal;
        let neighbors = 1;
        for (let ny2 = -1; ny2 <= 1; ny2++) {
          for (let nx2 = -1; nx2 <= 1; nx2++) {
            if (nx2 === 0 && ny2 === 0) continue;
            let tnx = x + nx2, tny = y + ny2;
            if (tnx >= 0 && tnx < MAP_W && tny >= 0 && tny < MAP_H) {
              let nt = mapData[tny][tnx];
              if (nt !== 4) {
                blendDepth += (nt === 0 ? 0 : nt === 1 ? 0.4 : nt === 2 ? 0.75 : 0.2);
                neighbors++;
              }
            }
          }
        }
        blendDepth /= neighbors;

        // Interpolate water color with depth variation and time-of-day tint
        let depthColor = Math.sin(waveTime * 0.3 + x * 0.05 + y * 0.03) * 0.08;
        let r = Math.round(10 + blendDepth * 18 + depthColor * 8);
        let g = Math.round(30 + blendDepth * 55 + depthColor * 12 + Math.sin(waveTime * 0.5 + y * 0.1) * 3);
        let b = Math.round(50 + blendDepth * 70 + depthColor * 15);
        // Deeper water gets a darker blue-green tint
        if (blendDepth < 0.2) {
          g += 5; b += 10;
        }
        ctx.fillStyle = `rgb(${Math.max(0,r)},${Math.max(0,g)},${Math.max(0,b)})`;
        ctx.fillRect(px, py, TILE, TILE);

        // Overlapping sine waves for animated water
        let wave1 = Math.sin(waveTime * 1.5 + x * 0.4 + y * 0.3) * 0.5 + 0.5;
        let wave2 = Math.sin(waveTime * 2.2 + x * 0.7 - y * 0.5 + 1.7) * 0.5 + 0.5;
        let wave3 = Math.sin(waveTime * 0.8 - x * 0.2 + y * 0.6 + 3.1) * 0.5 + 0.5;
        let combinedWave = (wave1 * 0.4 + wave2 * 0.35 + wave3 * 0.25);

        // Wave highlight with varying opacity
        let waveAlpha = combinedWave * 0.06;
        ctx.fillStyle = `rgba(140,200,255,${waveAlpha})`;
        ctx.fillRect(px, py, TILE, TILE);

        // Foam/whitecap on wave crests
        if (combinedWave > 0.72) {
          let foamAlpha = (combinedWave - 0.72) * 0.5;
          ctx.fillStyle = `rgba(220,240,255,${foamAlpha})`;
          let foamX = px + Math.sin(waveTime + x) * 4;
          let foamY = py + Math.cos(waveTime * 0.7 + y) * 4;
          ctx.beginPath();
          ctx.ellipse(foamX + TILE/2, foamY + TILE/2, TILE * 0.4, TILE * 0.15, waveTime * 0.3 + x, 0, Math.PI * 2);
          ctx.fill();
        }

        // Secondary foam - smaller scattered whitecaps
        let foam2 = Math.sin(waveTime * 2.8 + x * 1.1 - y * 0.9) * Math.cos(waveTime * 1.9 + x * 0.6 + y * 1.3);
        if (foam2 > 0.55 && blendDepth > 0.3) {
          let f2Alpha = (foam2 - 0.55) * 0.35;
          ctx.fillStyle = `rgba(240,250,255,${f2Alpha})`;
          ctx.beginPath();
          ctx.arc(px + TILE * 0.3 + Math.sin(waveTime * 1.5 + x) * 3, py + TILE * 0.6, 2 + foam2 * 3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Caustic light patterns (shimmering)
        let caustic1 = Math.sin(waveTime * 3.1 + x * 1.3 + y * 0.9);
        let caustic2 = Math.cos(waveTime * 2.7 - x * 0.8 + y * 1.4);
        let causticVal = (caustic1 * caustic2 + 1) * 0.5;
        if (causticVal > 0.7) {
          let cAlpha = (causticVal - 0.7) * 0.15 * (0.5 + blendDepth * 0.5);
          ctx.fillStyle = `rgba(180,230,255,${cAlpha})`;
          let cx2 = px + (caustic1 * 0.5 + 0.5) * TILE;
          let cy2 = py + (caustic2 * 0.5 + 0.5) * TILE;
          ctx.beginPath();
          ctx.arc(cx2, cy2, 4 + causticVal * 6, 0, Math.PI * 2);
          ctx.fill();
        }

        // Current/flow lines (subtle)
        let flowPhase = waveTime * 0.6 + x * 0.15 + y * 0.1;
        let flowAlpha = (Math.sin(flowPhase) * 0.5 + 0.5) * 0.025;
        if (flowAlpha > 0.01) {
          ctx.strokeStyle = `rgba(160,210,255,${flowAlpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          let fx = px + (Math.sin(flowPhase * 2) * 0.3 + 0.5) * TILE;
          ctx.moveTo(fx, py + 2);
          ctx.quadraticCurveTo(fx + 8, py + TILE * 0.5 + Math.sin(flowPhase) * 5, fx - 4, py + TILE - 2);
          ctx.stroke();
        }

        // Rocky texture
        if (tile === 3) {
          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          let rx = (x * 7 + y * 13) % 20;
          let ry = (x * 11 + y * 3) % 20;
          ctx.beginPath();
          ctx.arc(px + rx + 5, py + ry + 5, 4 + (rx % 3), 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(px + (rx + 12) % TILE, py + (ry + 15) % TILE, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // Draw grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = Math.max(0, sx); x < Math.min(MAP_W, ex); x++) {
    ctx.beginPath();
    ctx.moveTo(x * TILE - cx, Math.max(0, sy) * TILE - cy);
    ctx.lineTo(x * TILE - cx, Math.min(MAP_H, ey) * TILE - cy);
    ctx.stroke();
  }

  // Draw dock details
  let dockPx = DOCK_X * TILE - cx, dockPy = DOCK_Y * TILE - cy;
  // Shop sign
  ctx.fillStyle = '#e8d5a3';
  ctx.font = '14px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('🏪 SHOP', dockPx + DOCK_W * TILE / 2, dockPy - 8);
  // Dock border
  ctx.strokeStyle = '#5a4a00';
  ctx.lineWidth = 2;
  ctx.strokeRect(dockPx, dockPy, DOCK_W * TILE, DOCK_H * TILE);

  // Draw territory zones (hidden until Territory Wars Phase 2)
  if (false) for (let zone of mp.territories) {
    if (!zone.zone_bounds) continue;
    let zb = zone.zone_bounds;
    let zx = zb.x * TILE - cx, zy = zb.y * TILE - cy;
    let zw = zb.w * TILE, zh = zb.h * TILE;
    // Zone fill
    ctx.fillStyle = zb.color || 'rgba(100,100,255,0.08)';
    ctx.fillRect(zx, zy, zw, zh);
    // Zone border
    ctx.strokeStyle = (zb.color || 'rgba(100,100,255,0.3)').replace(/[\d.]+\)$/, '0.4)');
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 4]);
    ctx.strokeRect(zx, zy, zw, zh);
    ctx.setLineDash([]);
    // Zone label
    ctx.fillStyle = 'rgba(232,213,163,0.5)';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(zone.zone_name, zx + zw/2, zy + 16);
    if (zone.owner_name) {
      ctx.fillStyle = 'rgba(255,255,100,0.5)';
      ctx.font = '10px Georgia';
      ctx.fillText('👑 ' + zone.owner_name, zx + zw/2, zy + 30);
    }
  }

  // Draw trap buoys
  for (let trap of state.traps) {
    let bx = trap.x - cx, by = trap.y - cy;
    if (bx < -20 || bx > W + 20 || by < -20 || by > H + 20) continue;

    let bobY = Math.sin(waveTime * 3 + trap.x * 0.1) * 3;
    let elapsed = state.timeOfDay - trap.timeSet + (state.day - trap.daySet) * 24;
    let readiness = Math.min(1, elapsed / getTrapFillTime());

    let color;
    if (readiness < 0.3) color = COLORS.buoyEmpty;
    else if (readiness < 0.8) color = COLORS.buoyPartial;
    else color = COLORS.buoyFull;

    // Buoy stick
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx, by + bobY + 8);
    ctx.lineTo(bx, by + bobY - 8);
    ctx.stroke();

    // Buoy ball
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(bx, by + bobY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(bx - 2, by + bobY - 2, 2, 0, Math.PI * 2);
    ctx.fill();

    // Readiness indicator (if nearby)
    let dist = Math.hypot(trap.x - state.boat.x, trap.y - state.boat.y);
    if (dist < 80) {
      ctx.fillStyle = 'rgba(232,213,163,0.8)';
      ctx.font = '11px Georgia';
      ctx.textAlign = 'center';
      if (readiness >= 0.8) ctx.fillText('Ready!', bx, by - 16);
      else ctx.fillText(Math.floor(readiness * 100) + '%', bx, by - 16);
    }
  }

  // Draw other players' traps
  drawMultiplayerTraps(cx, cy);

  // Draw boat
  drawBoat(cx, cy);

  // Multiplayer boats
  drawMultiplayerBoats(cx, cy);

  // Chat bubbles
  drawChatBubbles(cx, cy);

  // Particles
  updateParticles(dt, cx, cy);

  // Daylight/night overlay
  if (daylight < 1) {
    ctx.fillStyle = `rgba(0, 5, 20, ${(1 - daylight) * 0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Weather overlay
  drawWeather(dt);

  // Fog
  if (state.weather === 'foggy') {
    ctx.fillStyle = 'rgba(180, 190, 200, 0.4)';
    ctx.fillRect(0, 0, W, H);
  }

  // Mini-map
  drawMiniMap();
}

function drawMultiplayerBoats(cx, cy) {
  for (let p of mp.players) {
    // Lerp positions
    let lerp = mp.otherPlayerPositions.get(p.id);
    if (lerp) {
      lerp.x += (lerp.tx - lerp.x) * 0.15;
      lerp.y += (lerp.ty - lerp.y) * 0.15;
      // Angle lerp
      let da = lerp.tAngle - lerp.angle;
      while (da > Math.PI) da -= Math.PI * 2;
      while (da < -Math.PI) da += Math.PI * 2;
      lerp.angle += da * 0.15;
    }
    
    let px = (lerp ? lerp.x : p.x) - cx;
    let py = (lerp ? lerp.y : p.y) - cy;
    let angle = lerp ? lerp.angle : p.angle;
    
    if (px < -80 || px > W + 80 || py < -80 || py > H + 80) continue;
    
    ctx.save();
    ctx.translate(px, py);
    
    // Name label above boat
    ctx.fillStyle = 'rgba(232,213,163,0.9)';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, 0, -28);
    
    ctx.rotate(angle);
    
    // Wake
    if (p.speed > 0.5) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(-20 - i * 8, (Math.random() - 0.5) * 10, 3 + i, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // Hull
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.quadraticCurveTo(18, -10, -14, -10);
    ctx.lineTo(-16, 0);
    ctx.lineTo(-14, 10);
    ctx.quadraticCurveTo(18, 10, 20, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // Deck
    ctx.fillStyle = lightenColor(p.color, 20);
    ctx.beginPath();
    ctx.moveTo(16, 0);
    ctx.quadraticCurveTo(14, -7, -10, -7);
    ctx.lineTo(-12, 0);
    ctx.lineTo(-10, 7);
    ctx.quadraticCurveTo(14, 7, 16, 0);
    ctx.closePath();
    ctx.fill();
    
    // Cabin
    ctx.fillStyle = '#f5f5dc';
    ctx.fillRect(-8, -5, 10, 10);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.strokeRect(-8, -5, 10, 10);
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(-5, -3, 4, 6);
    
    ctx.restore();
  }
}

function lightenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}

function drawMultiplayerTraps(cx, cy) {
  for (let trap of mp.traps) {
    let bx = trap.x - cx, by = trap.y - cy;
    if (bx < -20 || bx > W + 20 || by < -20 || by > H + 20) continue;
    
    let bobY = Math.sin(waveTime * 3 + trap.x * 0.1) * 3;
    let color = trap.readiness < 0.3 ? '#e74c3c' : trap.readiness < 0.8 ? '#f39c12' : '#27ae60';
    
    // Buoy stick
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx, by + bobY + 8);
    ctx.lineTo(bx, by + bobY - 8);
    ctx.stroke();
    
    // Buoy ball (slightly transparent for other players' traps)
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(bx, by + bobY, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Owner name on hover (show if nearby)
    let dist = Math.hypot(trap.x - state.boat.x, trap.y - state.boat.y);
    if (dist < 80) {
      ctx.fillStyle = 'rgba(232,213,163,0.6)';
      ctx.font = '10px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText(trap.ownerName, bx, by - 16);
    }
  }
}

function drawChatBubbles(cx, cy) {
  // Draw recent chat messages as floating text near players
  for (const msg of mp.chatMessages) {
    if (msg.age > 4000) continue;
    // Find the player
    const sender = mp.players.find(p => p.name === msg.name);
    let px, py;
    if (sender) {
      let lerp = mp.otherPlayerPositions.get(sender.id);
      px = (lerp ? lerp.x : sender.x) - cx;
      py = (lerp ? lerp.y : sender.y) - cy - 40;
    } else if (msg.name === mp.myName) {
      px = state.boat.x - cx;
      py = state.boat.y - cy - 40;
    } else continue;
    
    if (px < -100 || px > W + 100 || py < -50 || py > H + 50) continue;
    
    let alpha = Math.min(1, (5000 - msg.age) / 1000);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(10,22,40,0.75)';
    ctx.font = '12px Georgia';
    let tw = ctx.measureText(msg.text).width;
    ctx.beginPath();
    ctx.roundRect(px - tw/2 - 8, py - 10, tw + 16, 22, 6);
    ctx.fill();
    ctx.fillStyle = '#e8d5a3';
    ctx.textAlign = 'center';
    ctx.fillText(msg.text, px, py + 5);
    ctx.restore();
  }
}

function drawMiniMap() {
  let mmW = 150, mmH = 150;
  let mmX = 12, mmY = H - mmH - 12;
  let scaleX = mmW / (MAP_W * TILE), scaleY = mmH / (MAP_H * TILE);

  ctx.save();
  // Background
  ctx.beginPath();
  ctx.roundRect(mmX, mmY, mmW, mmH, 8);
  ctx.fillStyle = 'rgba(10, 22, 40, 0.8)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(232,213,163,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.clip();

  // Territory zones on minimap (hidden until Territory Wars Phase 2)
  if (false) for (let zone of mp.territories) {
    if (!zone.zone_bounds) continue;
    let zb = zone.zone_bounds;
    ctx.fillStyle = zb.color || 'rgba(100,100,255,0.15)';
    ctx.fillRect(mmX + (zb.x / MAP_W) * mmW, mmY + (zb.y / MAP_H) * mmH,
                 (zb.w / MAP_W) * mmW, (zb.h / MAP_H) * mmH);
  }

  // Simplified map tiles (draw every 4th tile for performance)
  let step = 4;
  let tileW = mmW / (MAP_W / step), tileH = mmH / (MAP_H / step);
  for (let y = 0; y < MAP_H; y += step) {
    for (let x = 0; x < MAP_W; x += step) {
      let tile = mapData[y][x];
      if (tile === 4) ctx.fillStyle = '#8B6914';
      else if (tile === 0) ctx.fillStyle = '#0d2137';
      else if (tile === 1) ctx.fillStyle = '#143652';
      else if (tile === 2) ctx.fillStyle = '#1a5276';
      else ctx.fillStyle = '#2c3e50';
      ctx.fillRect(mmX + (x / MAP_W) * mmW, mmY + (y / MAP_H) * mmH, tileW + 1, tileH + 1);
    }
  }

  // Dock highlight
  ctx.strokeStyle = 'rgba(232,213,163,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(
    mmX + (DOCK_X / MAP_W) * mmW, mmY + (DOCK_Y / MAP_H) * mmH,
    (DOCK_W / MAP_W) * mmW, (DOCK_H / MAP_H) * mmH
  );

  // Trap buoys as tiny dots
  for (let trap of state.traps) {
    let tx = mmX + trap.x * scaleX, ty = mmY + trap.y * scaleY;
    let elapsed = state.timeOfDay - trap.timeSet + (state.day - trap.daySet) * 24;
    let readiness = Math.min(1, elapsed / getTrapFillTime());
    ctx.fillStyle = readiness >= 0.8 ? '#27ae60' : readiness >= 0.3 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(tx - 1.5, ty - 1.5, 3, 3);
  }

  // Other players on minimap
  for (let p of mp.players) {
    let opx = mmX + p.x * scaleX, opy = mmY + p.y * scaleY;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(opx, opy, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player dot (bright, pulsing)
  let px = mmX + state.boat.x * scaleX, py = mmY + state.boat.y * scaleY;
  let pulse = Math.sin(waveTime * 4) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(255, 255, 100, ${pulse})`;
  ctx.beginPath();
  ctx.arc(px, py, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px, py, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBoat(cx, cy) {
  let bx = state.boat.x - cx;
  let by = state.boat.y - cy;

  ctx.save();
  ctx.translate(bx, by);
  
  // Name label
  if (mp.myName) {
    ctx.fillStyle = 'rgba(255,255,100,0.9)';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(mp.myName, 0, -28);
  }
  
  ctx.rotate(state.boat.angle);

  let scale = 1 + state.boatLevel * 0.15;

  // Wake
  if (Math.abs(state.boat.speed) > 0.5) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < 3; i++) {
      let wx = -20 - i * 8 + Math.random() * 4;
      let wy = (Math.random() - 0.5) * (10 + i * 5);
      ctx.beginPath();
      ctx.arc(wx * scale, wy, 3 + i, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Hull
  ctx.fillStyle = mp.myColor || COLORS.boat;
  ctx.beginPath();
  ctx.moveTo(20 * scale, 0);
  ctx.quadraticCurveTo(18 * scale, -10 * scale, -14 * scale, -10 * scale);
  ctx.lineTo(-16 * scale, 0);
  ctx.lineTo(-14 * scale, 10 * scale);
  ctx.quadraticCurveTo(18 * scale, 10 * scale, 20 * scale, 0);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Deck
  ctx.fillStyle = mp.myColor ? lightenColor(mp.myColor, 20) : COLORS.boatDeck;
  ctx.beginPath();
  ctx.moveTo(16 * scale, 0);
  ctx.quadraticCurveTo(14 * scale, -7 * scale, -10 * scale, -7 * scale);
  ctx.lineTo(-12 * scale, 0);
  ctx.lineTo(-10 * scale, 7 * scale);
  ctx.quadraticCurveTo(14 * scale, 7 * scale, 16 * scale, 0);
  ctx.closePath();
  ctx.fill();

  // Cabin
  ctx.fillStyle = '#f5f5dc';
  ctx.fillRect(-8 * scale, -5 * scale, 10 * scale, 10 * scale);
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.strokeRect(-8 * scale, -5 * scale, 10 * scale, 10 * scale);
  // Window
  ctx.fillStyle = 'rgba(100,180,255,0.5)';
  ctx.fillRect(-5 * scale, -3 * scale, 4 * scale, 6 * scale);

  ctx.restore();
}

// ============= UNDERWATER RENDERING =============
let uwKelp = [];
let uwFish = [];
let uwBubbles = [];
let uwLobsters = [];
let uwRocks = [];
let uwInitialized = false;

function initUnderwater() {
  uwKelp = [];
  uwFish = [];
  uwBubbles = [];
  uwLobsters = [];
  uwRocks = [];

  // Kelp
  for (let i = 0; i < 12; i++) {
    uwKelp.push({
      x: Math.random() * W,
      segments: 4 + Math.floor(Math.random() * 5),
      height: 60 + Math.random() * 100,
      phase: Math.random() * Math.PI * 2,
      color: Math.random() > 0.5 ? COLORS.kelp : COLORS.kelpLight,
    });
  }

  // Fish
  for (let i = 0; i < 8; i++) {
    uwFish.push({
      x: Math.random() * W,
      y: 100 + Math.random() * (H - 250),
      vx: (Math.random() - 0.5) * 3,
      size: 8 + Math.random() * 12,
      color: ['#a0c4ff', '#bdb2ff', '#ffc6ff', '#caffbf', '#fdffb6'][Math.floor(Math.random() * 5)],
    });
  }

  // Rocks
  for (let i = 0; i < 8; i++) {
    uwRocks.push({
      x: Math.random() * W,
      w: 30 + Math.random() * 60,
      h: 15 + Math.random() * 30,
      color: `rgb(${60+Math.random()*40}, ${55+Math.random()*30}, ${50+Math.random()*20})`,
    });
  }

  uwInitialized = true;
}

function drawUnderwater(dt) {
  waveTime += dt;

  // Sky/surface gradient
  let grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#1a5276');
  grd.addColorStop(0.15, '#0d3d56');
  grd.addColorStop(0.5, '#0a2840');
  grd.addColorStop(1, '#061620');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Light rays from surface
  ctx.save();
  for (let i = 0; i < 5; i++) {
    let rx = W * 0.2 + i * W * 0.15 + Math.sin(waveTime * 0.5 + i) * 30;
    let alpha = 0.03 + Math.sin(waveTime * 0.3 + i * 1.5) * 0.015;
    ctx.fillStyle = `rgba(120, 200, 255, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(rx - 20, 0);
    ctx.lineTo(rx - 60 + Math.sin(waveTime * 0.2 + i) * 20, H);
    ctx.lineTo(rx + 60 + Math.sin(waveTime * 0.2 + i) * 20, H);
    ctx.lineTo(rx + 20, 0);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Water surface waves at top
  ctx.fillStyle = 'rgba(100, 180, 255, 0.15)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (let x = 0; x <= W; x += 10) {
    ctx.lineTo(x, 20 + Math.sin(waveTime * 3 + x * 0.03) * 8);
  }
  ctx.lineTo(W, 0);
  ctx.closePath();
  ctx.fill();

  let floorY = H - 80;

  // Rocks on floor
  for (let rock of uwRocks) {
    ctx.fillStyle = rock.color;
    ctx.beginPath();
    ctx.ellipse(rock.x, floorY + 5, rock.w / 2, rock.h / 2, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.ellipse(rock.x, floorY - rock.h/3, rock.w/3, rock.h/4, 0, Math.PI, 0);
    ctx.fill();
  }

  // Sandy floor
  let sandGrd = ctx.createLinearGradient(0, floorY - 10, 0, H);
  sandGrd.addColorStop(0, COLORS.sand);
  sandGrd.addColorStop(0.3, '#a08050');
  sandGrd.addColorStop(1, '#6b5530');
  ctx.fillStyle = sandGrd;
  ctx.beginPath();
  ctx.moveTo(0, floorY);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, floorY + Math.sin(x * 0.05 + 1.3) * 6);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Sand texture dots
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let i = 0; i < 40; i++) {
    let sx = (i * 97 + 13) % W;
    let sy = floorY + 10 + (i * 31) % 50;
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }

  // Kelp
  for (let k of uwKelp) {
    ctx.strokeStyle = k.color;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    let baseY = floorY;
    ctx.moveTo(k.x, baseY);
    let segH = k.height / k.segments;
    for (let s = 1; s <= k.segments; s++) {
      let sway = Math.sin(waveTime * 1.5 + k.phase + s * 0.5) * (8 + s * 3);
      ctx.quadraticCurveTo(
        k.x + sway * 0.5, baseY - segH * (s - 0.5),
        k.x + sway, baseY - segH * s
      );
    }
    ctx.stroke();

    // Kelp leaves
    for (let s = 1; s < k.segments; s++) {
      let leafY = baseY - segH * s;
      let sway = Math.sin(waveTime * 1.5 + k.phase + s * 0.5) * (8 + s * 3);
      let leafX = k.x + sway;
      ctx.fillStyle = k.color;
      ctx.beginPath();
      ctx.ellipse(leafX + 8, leafY, 8, 3, 0.3 + Math.sin(waveTime + s) * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Fish
  for (let f of uwFish) {
    f.x += f.vx;
    if (f.x < -20) f.x = W + 20;
    if (f.x > W + 20) f.x = -20;

    let fy = f.y + Math.sin(waveTime * 2 + f.x * 0.01) * 5;

    ctx.save();
    ctx.translate(f.x, fy);
    if (f.vx < 0) ctx.scale(-1, 1);

    ctx.fillStyle = f.color;
    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size, f.size * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-f.size, 0);
    ctx.lineTo(-f.size - f.size * 0.6, -f.size * 0.4);
    ctx.lineTo(-f.size - f.size * 0.6, f.size * 0.4);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(f.size * 0.4, -f.size * 0.1, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Trap on floor
  if (state.uwTrap) {
    let trapX = W / 2;
    let trapY = floorY - 20;

    if (state.uwHauling) {
      state.uwAnimY += dt * 100;
      trapY = Math.max(100, floorY - 20 - state.uwAnimY);
      if (trapY <= 100) {
        state.uwHauling = false;
        openCatchPanel();
      }
    }

    // Trap rope
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(trapX, 0);
    ctx.lineTo(trapX, trapY - 10);
    ctx.stroke();
    ctx.setLineDash([]);

    // Trap cage
    ctx.strokeStyle = '#5a5a3a';
    ctx.lineWidth = 2;
    ctx.fillStyle = 'rgba(90, 90, 58, 0.3)';
    ctx.fillRect(trapX - 30, trapY - 15, 60, 30);
    ctx.strokeRect(trapX - 30, trapY - 15, 60, 30);
    // Mesh lines
    ctx.strokeStyle = 'rgba(90, 90, 58, 0.5)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(trapX - 30 + i * 15, trapY - 15);
      ctx.lineTo(trapX - 30 + i * 15, trapY + 15);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(trapX - 30, trapY);
    ctx.lineTo(trapX + 30, trapY);
    ctx.stroke();

    // Entrance funnel
    ctx.strokeStyle = '#5a5a3a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(trapX - 30, trapY - 8);
    ctx.lineTo(trapX - 18, trapY);
    ctx.lineTo(trapX - 30, trapY + 8);
    ctx.stroke();

    // Lobsters near trap (if not hauling and has contents)
    if (!state.uwHauling && state.uwTrap.contents.length > 0) {
      for (let i = 0; i < Math.min(3, state.uwTrap.contents.length); i++) {
        drawLobster(trapX - 50 + i * 30 + Math.sin(waveTime + i) * 5, trapY + 5 + Math.sin(waveTime * 1.5 + i * 2) * 3, 1);
      }
    }

    // Crawling lobsters on floor (ambient)
    for (let i = 0; i < 3; i++) {
      let lx = W * 0.15 + i * W * 0.3 + Math.sin(waveTime * 0.3 + i * 3) * 30;
      let ly = floorY - 5 + Math.sin(waveTime + i * 2) * 2;
      drawLobster(lx, ly, 0.8);
    }
  }

  // Bubbles
  ctx.fillStyle = 'rgba(150, 220, 255, 0.3)';
  if (Math.random() < 0.1) {
    uwBubbles.push({ x: Math.random() * W, y: H, size: 1 + Math.random() * 4, speed: 0.5 + Math.random() });
  }
  for (let i = uwBubbles.length - 1; i >= 0; i--) {
    let b = uwBubbles[i];
    b.y -= b.speed;
    b.x += Math.sin(waveTime * 2 + b.y * 0.05) * 0.5;
    if (b.y < -10) { uwBubbles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200, 240, 255, 0.2)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Floating particles (detritus)
  ctx.fillStyle = 'rgba(200, 180, 140, 0.15)';
  for (let i = 0; i < 20; i++) {
    let px = (waveTime * 10 + i * 137) % (W + 40) - 20;
    let py = (i * 89 + Math.sin(waveTime * 0.5 + i) * 30) % H;
    ctx.beginPath();
    ctx.arc(px, py, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // UI hint
  if (!state.uwHauling && !state.catchOpen) {
    ctx.fillStyle = 'rgba(232,213,163,0.6)';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Press SPACE or tap to haul trap • ESC to go back', W/2, H - 30);
  }
}

function drawLobster(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Body
  ctx.fillStyle = COLORS.lobster;
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail segments
  for (let i = 1; i <= 4; i++) {
    ctx.fillStyle = i % 2 === 0 ? COLORS.lobster : COLORS.lobsterDark;
    ctx.beginPath();
    ctx.ellipse(-14 - i * 5, 0, 4, 4 - i * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Tail fan
  ctx.fillStyle = COLORS.lobsterDark;
  ctx.beginPath();
  ctx.moveTo(-35, 0);
  ctx.lineTo(-42, -6);
  ctx.lineTo(-40, 0);
  ctx.lineTo(-42, 6);
  ctx.closePath();
  ctx.fill();

  // Claws
  let clawWave = Math.sin(waveTime * 2) * 0.2;
  ctx.save();
  ctx.translate(14, -3);
  ctx.rotate(-0.4 + clawWave);
  ctx.fillStyle = COLORS.lobster;
  ctx.beginPath();
  ctx.ellipse(8, 0, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, -2);
  ctx.lineTo(20, -4);
  ctx.lineTo(20, 0);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, 2);
  ctx.lineTo(20, 4);
  ctx.lineTo(20, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(14, 3);
  ctx.rotate(0.4 - clawWave);
  ctx.fillStyle = COLORS.lobster;
  ctx.beginPath();
  ctx.ellipse(8, 0, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, -2);
  ctx.lineTo(20, -4);
  ctx.lineTo(20, 0);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, 2);
  ctx.lineTo(20, 4);
  ctx.lineTo(20, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Legs
  ctx.strokeStyle = COLORS.lobsterDark;
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    let lx = -4 + i * 6;
    ctx.beginPath();
    ctx.moveTo(lx, 5);
    ctx.lineTo(lx + 3, 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(lx, -5);
    ctx.lineTo(lx + 3, -10);
    ctx.stroke();
  }

  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(12, -5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(12, 5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Antennae
  ctx.strokeStyle = COLORS.lobsterDark;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(13, -5);
  ctx.quadraticCurveTo(25, -15 + Math.sin(waveTime * 3) * 3, 35, -12);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(13, 5);
  ctx.quadraticCurveTo(25, 15 + Math.sin(waveTime * 3 + 1) * 3, 35, 12);
  ctx.stroke();

  ctx.restore();
}

// ============= WEATHER =============
let raindrops = [];

function drawWeather(dt) {
  if (state.weather === 'rainy') {
    ctx.strokeStyle = 'rgba(150, 180, 220, 0.3)';
    ctx.lineWidth = 1;
    if (raindrops.length < 100) {
      for (let i = 0; i < 5; i++) {
        raindrops.push({ x: Math.random() * W, y: Math.random() * H, speed: 8 + Math.random() * 4 });
      }
    }
    for (let i = raindrops.length - 1; i >= 0; i--) {
      let r = raindrops[i];
      r.y += r.speed;
      r.x -= 2;
      if (r.y > H) { r.y = -10; r.x = Math.random() * W; }
      ctx.beginPath();
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x + 2, r.y + 10);
      ctx.stroke();
    }
  }
  if (state.weather === 'cloudy' || state.weather === 'rainy') {
    ctx.fillStyle = 'rgba(40, 50, 60, 0.15)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ============= PARTICLES =============
function updateParticles(dt, cx, cy) {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.life -= dt;
    p.x += p.vx;
    p.y += p.vy;
    p.vy *= 0.98;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    let px = p.x - cx, py = p.y - cy;
    ctx.fillStyle = `rgba(255,255,255,${p.life * 0.5})`;
    ctx.beginPath();
    ctx.arc(px, py, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============= GAME LOGIC =============
function getDaylight() {
  let h = state.timeOfDay;
  if (h >= 6 && h <= 8) return (h - 6) / 2; // sunrise
  if (h >= 8 && h <= 18) return 1; // day
  if (h >= 18 && h <= 20) return 1 - (h - 18) / 2; // sunset
  return 0; // night
}

function getTrapFillTime() {
  // hours for trap to fill
  let base = 3;
  if (state.baitLevel >= 2) base -= 0.5;
  if (state.trapLevel >= 2) base -= 0.5;
  if (state.weather === 'clear') base -= 0.3;
  if (getDaylight() < 0.5) base -= 0.5; // lobsters more active at night
  return Math.max(1, base);
}

function getBoatSpeed() {
  return 2 + state.boatLevel * 0.8;
}

function isOnDock() {
  let tx = Math.floor(state.boat.x / TILE);
  let ty = Math.floor(state.boat.y / TILE);
  return tx >= DOCK_X && tx < DOCK_X + DOCK_W && ty >= DOCK_Y && ty < DOCK_Y + DOCK_H;
}

function getTileAt(wx, wy) {
  let tx = Math.floor(wx / TILE);
  let ty = Math.floor(wy / TILE);
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return 0;
  return mapData[ty][tx];
}

function generateTrapContents() {
  let trap = state.uwTrap;
  if (!trap || trap.contents.length > 0) return;

  let elapsed = state.timeOfDay - trap.timeSet + (state.day - trap.daySet) * 24;
  let readiness = Math.min(1, elapsed / getTrapFillTime());
  if (readiness < 0.3) return;

  let tile = getTileAt(trap.x, trap.y);
  let rockyBonus = tile === 3 ? 1.5 : 1;
  let count = Math.floor(readiness * 4 * rockyBonus * (0.5 + Math.random()));

  let contents = [];
  for (let i = 0; i < count; i++) {
    let roll = Math.random();
    if (roll < 0.15) {
      // Crab
      contents.push({ type: 'crab', size: 0, legal: false, label: '🦀 Crab' });
    } else if (roll < 0.3) {
      // Undersized lobster
      let size = 2.5 + Math.random() * 0.7; // under 3.25"
      contents.push({ type: 'lobster', size, legal: false, label: `🦞 Lobster (${size.toFixed(2)}" - TOO SMALL)`, reason: 'undersized' });
    } else if (roll < 0.38) {
      // Egg-bearing female
      let size = 3.25 + Math.random() * 1.5;
      contents.push({ type: 'lobster', size, legal: false, label: `🦞 Egg-bearing Female (${size.toFixed(2)}")`, reason: 'egg-bearing' });
    } else if (roll < 0.42) {
      // V-notched
      let size = 3.25 + Math.random() * 1.5;
      contents.push({ type: 'lobster', size, legal: false, label: `🦞 V-notched Female (${size.toFixed(2)}")`, reason: 'v-notch' });
    } else {
      // Legal lobster!
      let size = 3.25 + Math.random() * 2;
      contents.push({ type: 'lobster', size, legal: true, label: `🦞 Legal Lobster (${size.toFixed(2)}")` });
    }
  }

  if (count === 0) {
    contents.push({ type: 'empty', label: '🪹 Empty trap', legal: false });
  }

  trap.contents = contents;
}

function dropTrap() {
  if (state.trapSupply <= 0) { notify("No traps! Buy more at the dock."); return; }
  if (state.bait <= 0) { notify("No bait! Buy more at the dock."); return; }
  if (state.traps.length >= state.maxTraps) { notify(`Max ${state.maxTraps} traps!`); return; }

  let tile = getTileAt(state.boat.x, state.boat.y);
  if (tile === 4) { notify("Can't set traps on the dock!"); return; }

  // Check if too close to another trap
  for (let t of state.traps) {
    if (Math.hypot(t.x - state.boat.x, t.y - state.boat.y) < 50) {
      notify("Too close to another trap!"); return;
    }
  }

  state.trapSupply--;
  state.bait--;
  state.traps.push({
    x: state.boat.x,
    y: state.boat.y,
    timeSet: state.timeOfDay,
    daySet: state.day,
    contents: [],
  });
  sendDropTrap(state.boat.x, state.boat.y);

  // Splash particles
  for (let i = 0; i < 10; i++) {
    addParticle(state.boat.x, state.boat.y, 'splash');
  }

  notify(`Trap set! (${state.traps.length}/${state.maxTraps})`);
  updateHUD();
}

function checkNearbyTrap() {
  for (let trap of state.traps) {
    let dist = Math.hypot(trap.x - state.boat.x, trap.y - state.boat.y);
    if (dist < 60) {
      return trap;
    }
  }
  return null;
}

function enterUnderwater(trap) {
  state.mode = 'underwater';
  state.uwTrap = trap;
  state.uwAnimY = 0;
  state.uwHauling = false;
  if (!uwInitialized) initUnderwater();
  generateTrapContents();
  updateHints();
}

function exitUnderwater() {
  state.mode = 'topdown';
  state.uwTrap = null;
  state.uwHauling = false;
  state.catchOpen = false;
  document.getElementById('catch-panel').style.display = 'none';
  updateHints();
}

function haulTrap() {
  if (!state.uwTrap || state.uwHauling) return;
  state.uwHauling = true;
  state.uwAnimY = 0;
}

function openCatchPanel() {
  if (!state.uwTrap) return;
  state.catchOpen = true;
  let panel = document.getElementById('catch-panel');
  let itemsDiv = document.getElementById('catch-items');
  itemsDiv.innerHTML = '';

  for (let i = 0; i < state.uwTrap.contents.length; i++) {
    let item = state.uwTrap.contents[i];
    let div = document.createElement('div');
    div.className = 'catch-item';

    let label = document.createElement('span');
    label.textContent = item.label;
    label.style.fontSize = '13px';
    div.appendChild(label);

    let actions = document.createElement('span');
    if (item.type === 'lobster' && item.legal) {
      let keepBtn = document.createElement('button');
      keepBtn.className = 'catch-action keep';
      keepBtn.textContent = '✓ Keep';
      keepBtn.onclick = () => keepLobster(i, div);
      actions.appendChild(keepBtn);
    } else if (item.type === 'lobster' && !item.legal) {
      let tossBtn = document.createElement('button');
      tossBtn.className = 'catch-action toss';
      tossBtn.textContent = '↩ Toss Back';
      tossBtn.onclick = () => { div.style.opacity = '0.3'; tossBtn.disabled = true; };
      actions.appendChild(tossBtn);
      if (item.reason) {
        let reason = document.createElement('span');
        reason.style.fontSize = '10px';
        reason.style.color = '#a55';
        reason.style.marginLeft = '6px';
        reason.textContent = `(${item.reason})`;
        actions.appendChild(reason);
      }
    } else if (item.type === 'crab') {
      let tossBtn = document.createElement('button');
      tossBtn.className = 'catch-action toss';
      tossBtn.textContent = '↩ Toss';
      tossBtn.onclick = () => { div.style.opacity = '0.3'; tossBtn.disabled = true; };
      actions.appendChild(tossBtn);
    }
    div.appendChild(actions);
    itemsDiv.appendChild(div);
  }

  panel.style.display = 'block';
}

function keepLobster(index, div) {
  let item = state.uwTrap.contents[index];
  if (state.hold.length >= getHoldCapacity()) {
    notify("Hold is full! Sell at dock first.");
    return;
  }
  state.hold.push({ size: item.size, type: 'lobster' });
  div.style.opacity = '0.3';
  div.querySelector('.catch-action').disabled = true;
  div.querySelector('.catch-action').textContent = '✓ Kept';
  updateHUD();
}

function closeCatch() {
  state.catchOpen = false;
  document.getElementById('catch-panel').style.display = 'none';
  // Remove trap from local state
  let idx = state.traps.indexOf(state.uwTrap);
  if (idx >= 0) state.traps.splice(idx, 1);
  // Also notify server to remove this trap for other players
  if (mp.ws && mp.ws.readyState === 1 && state.uwTrap) {
    mp.ws.send(JSON.stringify({ type: 'removeTrap', x: state.uwTrap.x, y: state.uwTrap.y }));
  }
  // Return trap to supply
  state.trapSupply++;
  exitUnderwater();
  updateHUD();
}

function getHoldCapacity() {
  return 20 + (state.holdLevel - 1) * 10;
}

function getLobsterPrice(size) {
  // Price per lobster based on size
  if (size < 3.5) return 8;
  if (size < 4) return 12;
  if (size < 4.5) return 16;
  return 22;
}

function sellCatch() {
  if (state.hold.length === 0) { notify("Nothing to sell!"); return; }
  let total = 0;
  for (let item of state.hold) {
    total += getLobsterPrice(item.size);
  }
  let count = state.hold.length;
  state.cash += total;
  state.hold = [];
  notify(`Sold ${count} lobster${count > 1 ? 's' : ''} for $${total}!`);
  updateHUD();
  updateShop();
}

// ============= SHOP =============
function openShop() {
  state.shopOpen = true;
  document.getElementById('shop-panel').style.display = 'block';
  updateShop();
}

function closeShop() {
  state.shopOpen = false;
  document.getElementById('shop-panel').style.display = 'none';
}

function updateShop() {
  let items = document.getElementById('shop-items');
  let baitPrice = 5 - (state.baitLevel > 1 ? 1 : 0);
  let trapPrice = 25;
  items.innerHTML = `
    <div class="shop-item">
      <span>🐟 Bait (${state.bait}) — $${baitPrice} ea</span>
      <span>
        <button class="shop-btn" onclick="buyBait(1)">Buy 1</button>
        <button class="shop-btn" onclick="buyBait(10)" style="margin-left:4px">Buy 10</button>
      </span>
    </div>
    <div class="shop-item">
      <span>🪤 Traps (${state.trapSupply}) — $${trapPrice} ea</span>
      <span>
        <button class="shop-btn" onclick="buyTrap(1)">Buy 1</button>
        <button class="shop-btn" onclick="buyTrap(5)" style="margin-left:4px">Buy 5</button>
      </span>
    </div>
  `;
  document.getElementById('sell-btn').textContent = state.hold.length > 0
    ? `💰 Sell ${state.hold.length} lobster${state.hold.length > 1 ? 's' : ''}`
    : '💰 Nothing to sell';
}

function buyBait(n) {
  let price = (5 - (state.baitLevel > 1 ? 1 : 0)) * n;
  if (state.cash < price) { notify("Not enough cash!"); return; }
  state.cash -= price;
  state.bait += n;
  updateHUD(); updateShop();
}

function buyTrap(n) {
  let price = 25 * n;
  if (state.cash < price) { notify("Not enough cash!"); return; }
  state.cash -= price;
  state.trapSupply += n;
  updateHUD(); updateShop();
}

// ============= UPGRADES =============
function openUpgrades() {
  state.upgradeOpen = true;
  document.getElementById('shop-panel').style.display = 'none';
  document.getElementById('upgrade-panel').style.display = 'block';
  updateUpgradePanel();
}

function closeUpgrades() {
  state.upgradeOpen = false;
  document.getElementById('upgrade-panel').style.display = 'none';
  document.getElementById('shop-panel').style.display = 'block';
}

const UPGRADES = [
  { key: 'boatLevel', name: '⛵ Boat Speed', maxLevel: 5, basePrice: 200, desc: l => `Level ${l} → ${l+1} (faster)` },
  { key: 'trapLevel', name: '🪤 Trap Quality', maxLevel: 4, basePrice: 150, desc: l => `Level ${l} → ${l+1} (fill faster)` },
  { key: 'baitLevel', name: '🐟 Bait Quality', maxLevel: 3, basePrice: 100, desc: l => `Level ${l} → ${l+1} (cheaper + better)` },
  { key: 'holdLevel', name: '📦 Hold Size', maxLevel: 5, basePrice: 180, desc: l => `Level ${l} → ${l+1} (${20 + l*10} capacity)` },
  { key: 'maxTraps', name: '🔢 Max Traps', maxLevel: 30, basePrice: 50, desc: l => `${l} → ${l+5} traps`, step: 5 },
];

function updateUpgradePanel() {
  let items = document.getElementById('upgrade-items');
  items.innerHTML = '';
  for (let u of UPGRADES) {
    let level = state[u.key];
    let maxed = u.key === 'maxTraps' ? level >= u.maxLevel : level >= u.maxLevel;
    let price = u.basePrice * (u.key === 'maxTraps' ? Math.ceil(level/5) : level);
    let div = document.createElement('div');
    div.className = 'upgrade-item';
    div.innerHTML = `
      <div>
        <div style="font-size:14px">${u.name}</div>
        <div style="font-size:11px;opacity:0.6">${maxed ? 'MAX' : u.desc(level)} — $${price}</div>
      </div>
    `;
    if (!maxed) {
      let btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.textContent = `$${price}`;
      btn.disabled = state.cash < price;
      btn.onclick = () => {
        if (state.cash >= price) {
          state.cash -= price;
          if (u.key === 'maxTraps') state[u.key] += (u.step || 5);
          else state[u.key]++;
          updateHUD();
          updateUpgradePanel();
          notify(`${u.name} upgraded!`);
        }
      };
      div.appendChild(btn);
    }
    items.appendChild(div);
  }
}

  document.getElementById('hud-hold').textContent = `${state.hold.length} / ${getHoldCapacity()}`;

// ============= INPUT =============
document.addEventListener('keydown', e => {
  if (chatActive) return; // don't process game keys while chatting
  state.keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    handleAction();
  }
  if (e.key === 'e' || e.key === 'E') {
    if (isOnDock() && state.mode === 'topdown') {
      if (state.shopOpen) closeShop();
      else openShop();
    }
  }
  if (e.key === 'Escape') {
    if (state.catchOpen) closeCatch();
    else if (state.upgradeOpen) closeUpgrades();
    else if (state.shopOpen) closeShop();
    else if (state.mode === 'underwater') exitUnderwater();
  }
});
document.addEventListener('keyup', e => { state.keys[e.key.toLowerCase()] = false; });

// Touch
let touchStart = null;
C.addEventListener('touchstart', e => {
  e.preventDefault();
  let t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY, time: Date.now() };
  state.touch = { x: t.clientX, y: t.clientY };
});
C.addEventListener('touchmove', e => {
  e.preventDefault();
  let t = e.touches[0];
  state.touch = { x: t.clientX, y: t.clientY };
});
C.addEventListener('touchend', e => {
  e.preventDefault();
  if (touchStart && Date.now() - touchStart.time < 300) {
    handleAction();
  }
  state.touch = null;
  touchStart = null;
});

// Click
C.addEventListener('click', e => {
  if (state.mode === 'topdown') {
    // Click to set waypoint? For now, just action
    handleAction();
  }
});

function handleAction() {
  if (state.mode === 'underwater') {
    haulTrap();
    return;
  }
  if (state.shopOpen || state.upgradeOpen) return;

  if (isOnDock()) {
    openShop();
    return;
  }

  // Check nearby trap
  let nearTrap = checkNearbyTrap();
  if (nearTrap) {
    enterUnderwater(nearTrap);
    return;
  }

  // Drop trap
  dropTrap();
}

// ============= BOAT COLLISIONS =============
let screenShake = { x: 0, y: 0, intensity: 0 };
let boatBounceVel = { x: 0, y: 0 };

function checkBoatCollisions() {
  const COLLISION_DIST = 35;
  const BOUNCE_FORCE = 3.5;
  
  for (let p of mp.players) {
    let lerp = mp.otherPlayerPositions.get(p.id);
    let ox = lerp ? lerp.x : p.x;
    let oy = lerp ? lerp.y : p.y;
    let dx = state.boat.x - ox;
    let dy = state.boat.y - oy;
    let dist = Math.hypot(dx, dy);
    
    if (dist < COLLISION_DIST && dist > 0) {
      // Push apart
      let nx = dx / dist;
      let ny = dy / dist;
      let overlap = COLLISION_DIST - dist;
      
      // Move our boat out
      state.boat.x += nx * overlap * 0.6;
      state.boat.y += ny * overlap * 0.6;
      
      // Add bounce velocity
      boatBounceVel.x += nx * BOUNCE_FORCE;
      boatBounceVel.y += ny * BOUNCE_FORCE;
      
      // Screen shake
      screenShake.intensity = Math.max(screenShake.intensity, 4);
      
      // Splash particles at collision point
      let cx = (state.boat.x + ox) / 2;
      let cy = (state.boat.y + oy) / 2;
      for (let i = 0; i < 8; i++) {
        addParticle(cx, cy, 'splash');
      }
    }
  }
  
  // Apply and decay bounce velocity
  state.boat.x += boatBounceVel.x;
  state.boat.y += boatBounceVel.y;
  boatBounceVel.x *= 0.85;
  boatBounceVel.y *= 0.85;
  if (Math.abs(boatBounceVel.x) < 0.01) boatBounceVel.x = 0;
  if (Math.abs(boatBounceVel.y) < 0.01) boatBounceVel.y = 0;
  
  // Decay screen shake
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= 0.88;
    if (screenShake.intensity < 0.2) screenShake.intensity = 0;
  } else {
    screenShake.x = 0;
    screenShake.y = 0;
  }
  
  // Re-clamp bounds
  state.boat.x = Math.max(20, Math.min(MAP_W * TILE - 20, state.boat.x));
  state.boat.y = Math.max(20, Math.min(MAP_H * TILE - 20, state.boat.y));
}

// ============= UPDATE =============
function update(dt) {
  if (state.mode === 'topdown') {
    // Time & weather synced from server (no local advancement when connected)
    if (!mp.connected) {
      state.timeOfDay += dt * 0.02 * state.timeSpeed;
      if (state.timeOfDay >= 24) { state.timeOfDay -= 24; state.day++; }
      state.weatherTimer -= dt * state.timeSpeed;
      if (state.weatherTimer <= 0) {
        let weathers = ['clear', 'clear', 'clear', 'cloudy', 'cloudy', 'foggy', 'rainy'];
        state.weather = weathers[Math.floor(Math.random() * weathers.length)];
        state.weatherTimer = 300 + Math.random() * 600;
      }
    }

    // Send position to server
    let now = performance.now();
    if (now - mp.lastPositionSend > 50) {
      sendPosition();
      mp.lastPositionSend = now;
    }
    
    // Sync player state to server periodically (every 10s)
    if (!mp._lastSync) mp._lastSync = 0;
    if (now - mp._lastSync > 10000 && mp.ws && mp.ws.readyState === 1 && authSession) {
      mp.ws.send(JSON.stringify({
        type: 'updatePlayer',
        cash: state.cash,
        upgrades: {
          boatLevel: state.boatLevel, trapLevel: state.trapLevel,
          baitLevel: state.baitLevel, holdLevel: state.holdLevel, maxTraps: state.maxTraps,
        },
        inventory: { bait: state.bait, trapSupply: state.trapSupply, hold: state.hold },
        stats: state.stats || {},
        displayName: mp.myName,
      }));
      mp._lastSync = now;
    }

    // Boat movement
    let speed = getBoatSpeed();
    let moving = false;

    if (state.touch) {
      // Touch: move toward touch point
      let dx = state.touch.x - W / 2;
      let dy = state.touch.y - H / 2;
      let dist = Math.hypot(dx, dy);
      if (dist > 20) {
        state.boat.angle = Math.atan2(dy, dx);
        state.boat.speed = Math.min(speed, dist * 0.05);
        moving = true;
      }
    } else {
      let dx = 0, dy = 0;
      if (state.keys['w'] || state.keys['arrowup']) dy = -1;
      if (state.keys['s'] || state.keys['arrowdown']) dy = 1;
      if (state.keys['a'] || state.keys['arrowleft']) dx = -1;
      if (state.keys['d'] || state.keys['arrowright']) dx = 1;
      if (dx || dy) {
        let targetAngle = Math.atan2(dy, dx);
        // Smooth rotation
        let diff = targetAngle - state.boat.angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        state.boat.angle += diff * 0.1;
        state.boat.speed = speed;
        moving = true;
      }
    }

    if (!moving) {
      state.boat.speed *= 0.92;
    }

    let newX = state.boat.x + Math.cos(state.boat.angle) * state.boat.speed;
    let newY = state.boat.y + Math.sin(state.boat.angle) * state.boat.speed;

    // Bounds
    newX = Math.max(20, Math.min(MAP_W * TILE - 20, newX));
    newY = Math.max(20, Math.min(MAP_H * TILE - 20, newY));

    state.boat.x = newX;
    state.boat.y = newY;

    // Client-side boat collisions with other players
    checkBoatCollisions();

    // Wake particles
    if (state.boat.speed > 1) {
      if (Math.random() < 0.3) {
        addParticle(
          state.boat.x - Math.cos(state.boat.angle) * 15,
          state.boat.y - Math.sin(state.boat.angle) * 15,
          'wake'
        );
      }
    }

    updateHUD();
  }
}

// ============= SAVE/LOAD =============
function saveGame() {
  let save = {
    cash: state.cash, day: state.day, timeOfDay: state.timeOfDay,
    weather: state.weather, boat: state.boat, traps: state.traps,
    hold: state.hold, bait: state.bait, trapSupply: state.trapSupply,
    maxTraps: state.maxTraps, boatLevel: state.boatLevel, trapLevel: state.trapLevel,
    baitLevel: state.baitLevel, holdLevel: state.holdLevel,
  };
  localStorage.setItem('lobster-wars-save', JSON.stringify(save));
}

function loadGame() {
  let data = localStorage.getItem('lobster-wars-save') || localStorage.getItem('lobster-grounds-save');
  if (!data) return false;
  try {
    let save = JSON.parse(data);
    Object.assign(state, save);
    return true;
  } catch { return false; }
}

// ============= MAIN LOOP =============
let lastTime = 0;
let started = false;

function gameLoop(timestamp) {
  if (!started) { requestAnimationFrame(gameLoop); return; }
  let dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  update(dt);

  if (state.mode === 'topdown') {
    drawTopDown(dt);
  } else {
    drawUnderwater(dt);
  }

  // Auto-save every 30s
  if (Math.floor(timestamp / 30000) !== Math.floor((timestamp - 16) / 30000)) {
    saveGame();
  }

  requestAnimationFrame(gameLoop);
}

// ============= START =============
function startGame(continuing) {
  generateMap();
  if (continuing) loadGame();
  connectMultiplayer();
  started = true;
  document.getElementById('start-screen').style.display = 'none';
  updateHUD();
  updateHints();
  lastTime = performance.now();
}

// Save check moved to onAuthSuccess

// Prevent pinch-zoom on mobile
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());

document.getElementById('start-btn').addEventListener('click', () => startGame(false));
document.getElementById('continue-btn').addEventListener('click', () => startGame(true));

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
